    <div class="nav-links" [class.abierto]="menuAbierto">

        <!-- Sin sesión -->
        <button *ngIf="!isLoggedIn" class="btn-login" (click)="goToLogin()">Iniciar sesión</button>

        <!-- Con sesión: avatar con dropdown -->
        <div *ngIf="isLoggedIn" class="nav-perfil-wrapper" (click)="$event.stopPropagation()">

            </button>
            <div class="nav-dropdown" [class.visible]="perfilAbierto">
                <div class="nav-dropdown-nombre">{{ adminNombre }}</div>
                <hr class="nav-dropdown-hr">
                <button class="nav-dropdown-logout" (click)="logout()">
